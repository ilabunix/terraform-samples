AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 Image Builder Infrastructure for BloomReach - All 4 AMI Types'

Parameters:
  BaseAMIId:
    Type: String
    Description: 'Base AMI ID from nit_base_ami_name.txt (for Silver AMIs)'

Resources:
  # ========================================
  # INFRASTRUCTURE CONFIGURATION (Shared)
  # ========================================
  
  InfrastructureConfigurationAuthoring:
    Type: AWS::ImageBuilder::InfrastructureConfiguration
    Properties:
      Name: bloomreach-infrastructure-authoring
      Description: 'Infrastructure for Authoring AMI builds'
      InstanceTypes:
        - t3a.large
      InstanceProfileName: bloomreach-authoring-ec2-role  # Your existing profile
      SubnetId: subnet-06bd3c06adb1bedbq
      SecurityGroupIds:
        - sg-0b3cce454eec38ab1
      TerminateInstanceOnFailure: true
      Logging:
        S3Logs:
          S3BucketName: !Ref LogBucket
          S3KeyPrefix: imagebuilder-logs/authoring/

  InfrastructureConfigurationDelivery:
    Type: AWS::ImageBuilder::InfrastructureConfiguration
    Properties:
      Name: bloomreach-infrastructure-delivery
      Description: 'Infrastructure for Delivery AMI builds'
      InstanceTypes:
        - t3a.large
      InstanceProfileName: bloomreach-delivery-ec2-role  # Your existing profile
      SubnetId: subnet-0fa9d3cc9cfa30193
      SecurityGroupIds:
        - sg-0a2f22a4187db3b66
      TerminateInstanceOnFailure: true
      Logging:
        S3Logs:
          S3BucketName: !Ref LogBucket
          S3KeyPrefix: imagebuilder-logs/delivery/

  # ========================================
  # S3 BUCKET FOR LOGS
  # ========================================
  
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'bloomreach-imagebuilder-logs-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ========================================
  # DISTRIBUTION CONFIGURATION (Shared)
  # ========================================
  
  DistributionConfiguration:
    Type: AWS::ImageBuilder::DistributionConfiguration
    Properties:
      Name: bloomreach-distribution
      Description: 'Distribution configuration for sharing AMIs to TEST/QA/PROD'
      Distributions:
        - Region: us-east-2
          AmiDistributionConfiguration:
            Name: 'BLOOMREACH-{{ imagebuilder:buildDate }}'
            Description: 'BloomReach AMI built on {{ imagebuilder:buildDate }}'
            AmiTags:
              BuildDate: '{{ imagebuilder:buildDate }}'
              BuildVersion: '{{ imagebuilder:buildVersion }}'
              Application: BloomReach
              Environment: Production
            LaunchPermissionConfiguration:
              UserIds:
                - '175809624659'  # TEST
                - '762649877014'  # QA
                - '609253628652'  # PROD

  # ========================================
  # SILVER AUTHORING
  # ========================================
  
  SilverAuthoringRecipe:
    Type: AWS::ImageBuilder::ImageRecipe
    Properties:
      Name: bloomreach-silver-authoring-recipe
      Version: 1.0.0
      Description: 'Silver tier AMI for BloomReach Authoring'
      ParentImage: !Ref BaseAMIId
      Components:
        - ComponentArn: !Sub 'arn:aws:imagebuilder:${AWS::Region}:${AWS::AccountId}:component/bloomreach-silver-authoring-setup/1.0.0'
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            KmsKeyId: 781c2c45-9b01-4cb3-a47c-073e610b8782
            VolumeSize: 100
            VolumeType: gp3
            Iops: 3000

  SilverAuthoringPipeline:
    Type: AWS::ImageBuilder::ImagePipeline
    Properties:
      Name: bloomreach-silver-authoring-pipeline
      Description: 'Pipeline for building BloomReach Silver Authoring AMIs'
      ImageRecipeArn: !GetAtt SilverAuthoringRecipe.Arn
      InfrastructureConfigurationArn: !GetAtt InfrastructureConfigurationAuthoring.Arn
      DistributionConfigurationArn: !GetAtt DistributionConfiguration.Arn
      Status: ENABLED

  # ========================================
  # SILVER DELIVERY
  # ========================================
  
  SilverDeliveryRecipe:
    Type: AWS::ImageBuilder::ImageRecipe
    Properties:
      Name: bloomreach-silver-delivery-recipe
      Version: 1.0.0
      Description: 'Silver tier AMI for BloomReach Delivery'
      ParentImage: !Ref BaseAMIId
      Components:
        - ComponentArn: !Sub 'arn:aws:imagebuilder:${AWS::Region}:${AWS::AccountId}:component/bloomreach-silver-delivery-setup/1.0.0'
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            KmsKeyId: 781c2c45-9b01-4cb3-a47c-073e610b8782
            VolumeSize: 100
            VolumeType: gp3
            Iops: 3000

  SilverDeliveryPipeline:
    Type: AWS::ImageBuilder::ImagePipeline
    Properties:
      Name: bloomreach-silver-delivery-pipeline
      Description: 'Pipeline for building BloomReach Silver Delivery AMIs'
      ImageRecipeArn: !GetAtt SilverDeliveryRecipe.Arn
      InfrastructureConfigurationArn: !GetAtt InfrastructureConfigurationDelivery.Arn
      DistributionConfigurationArn: !GetAtt DistributionConfiguration.Arn
      Status: ENABLED

  # ========================================
  # BRONZE AUTHORING
  # ========================================
  
  BronzeAuthoringRecipe:
    Type: AWS::ImageBuilder::ImageRecipe
    Properties:
      Name: bloomreach-bronze-authoring-recipe
      Version: 1.0.0
      Description: 'Bronze tier AMI for BloomReach Authoring (built on top of Silver)'
      # ParentImage will be set to Silver Authoring AMI ID manually after Silver is built
      # Or use a parameter to pass it in
      ParentImage: !Ref BaseAMIId  # Placeholder - update after Silver AMI exists
      Components:
        - ComponentArn: !Sub 'arn:aws:imagebuilder:${AWS::Region}:${AWS::AccountId}:component/bloomreach-bronze-authoring-setup/1.0.0'
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            KmsKeyId: 781c2c45-9b01-4cb3-a47c-073e610b8782
            VolumeSize: 100
            VolumeType: gp3
            Iops: 3000

  BronzeAuthoringPipeline:
    Type: AWS::ImageBuilder::ImagePipeline
    Properties:
      Name: bloomreach-bronze-authoring-pipeline
      Description: 'Pipeline for building BloomReach Bronze Authoring AMIs'
      ImageRecipeArn: !GetAtt BronzeAuthoringRecipe.Arn
      InfrastructureConfigurationArn: !GetAtt InfrastructureConfigurationAuthoring.Arn
      DistributionConfigurationArn: !GetAtt DistributionConfiguration.Arn
      Status: DISABLED  # Start disabled until Silver AMI exists

  # ========================================
  # BRONZE DELIVERY
  # ========================================
  
  BronzeDeliveryRecipe:
    Type: AWS::ImageBuilder::ImageRecipe
    Properties:
      Name: bloomreach-bronze-delivery-recipe
      Version: 1.0.0
      Description: 'Bronze tier AMI for BloomReach Delivery (built on top of Silver)'
      ParentImage: !Ref BaseAMIId  # Placeholder - update after Silver AMI exists
      Components:
        - ComponentArn: !Sub 'arn:aws:imagebuilder:${AWS::Region}:${AWS::AccountId}:component/bloomreach-bronze-delivery-setup/1.0.0'
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            KmsKeyId: 781c2c45-9b01-4cb3-a47c-073e610b8782
            VolumeSize: 100
            VolumeType: gp3
            Iops: 3000

  BronzeDeliveryPipeline:
    Type: AWS::ImageBuilder::ImagePipeline
    Properties:
      Name: bloomreach-bronze-delivery-pipeline
      Description: 'Pipeline for building BloomReach Bronze Delivery AMIs'
      ImageRecipeArn: !GetAtt BronzeDeliveryRecipe.Arn
      InfrastructureConfigurationArn: !GetAtt InfrastructureConfigurationDelivery.Arn
      DistributionConfigurationArn: !GetAtt DistributionConfiguration.Arn
      Status: DISABLED  # Start disabled until Silver AMI exists

Outputs:
  SilverAuthoringPipelineArn:
    Description: 'ARN of Silver Authoring Pipeline'
    Value: !GetAtt SilverAuthoringPipeline.Arn
    Export:
      Name: BloomReach-Silver-Authoring-Pipeline-ARN
  
  SilverDeliveryPipelineArn:
    Description: 'ARN of Silver Delivery Pipeline'
    Value: !GetAtt SilverDeliveryPipeline.Arn
    Export:
      Name: BloomReach-Silver-Delivery-Pipeline-ARN
  
  BronzeAuthoringPipelineArn:
    Description: 'ARN of Bronze Authoring Pipeline'
    Value: !GetAtt BronzeAuthoringPipeline.Arn
    Export:
      Name: BloomReach-Bronze-Authoring-Pipeline-ARN
  
  BronzeDeliveryPipelineArn:
    Description: 'ARN of Bronze Delivery Pipeline'
    Value: !GetAtt BronzeDeliveryPipeline.Arn
    Export:
      Name: BloomReach-Bronze-Delivery-Pipeline-ARN
  
  LogBucket:
    Description: 'S3 bucket for Image Builder logs'
    Value: !Ref LogBucket
